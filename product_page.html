<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - FASHION HUB</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .product-detail-wrapper {
            padding: 2rem 0 4rem;
        }

        .breadcrumb {
            margin-bottom: 1.2rem;
            font-size: 0.9rem;
            color: #888;
        }

        .breadcrumb a {
            color: #667eea;
            text-decoration: none;
        }

        .breadcrumb a:hover {
            text-decoration: underline;
        }

        .breadcrumb span {
            margin: 0 0.4rem;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
        }

        .btn-back:hover {
            text-decoration: underline;
        }

        .product-detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2.5rem;
            align-items: start;
        }

        @media (max-width: 700px) {
            .product-detail-grid {
                grid-template-columns: 1fr;
            }
        }

        .product-detail-image {
            width: 100%;
            border-radius: 12px;
            min-height: 380px;
            object-fit: cover;
            display: block;
            background: #eee;
        }

        .product-detail-image-placeholder {
            width: 100%;
            min-height: 380px;
            background: linear-gradient(135deg, #e8eaf6 0%, #f3e5f5 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 6rem;
        }

        .product-detail-info {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .product-detail-name {
            font-size: 2rem;
            font-weight: 700;
            color: #222;
            line-height: 1.2;
        }

        .product-detail-price {
            font-size: 1.9rem;
            font-weight: 700;
            color: #667eea;
        }

        .product-detail-retailer {
            color: #666;
            font-size: 1rem;
        }

        .product-detail-retailer strong {
            color: #333;
        }

        .product-detail-category-tag {
            display: inline-block;
            background: #e8eaf6;
            color: #667eea;
            padding: 0.35rem 0.9rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: capitalize;
            width: fit-content;
        }

        .product-detail-description {
            color: #555;
            line-height: 1.75;
            font-size: 1rem;
        }

        .divider {
            border: none;
            border-top: 1px solid #eee;
        }

        .sizes-label {
            font-weight: 600;
            margin-bottom: 0.6rem;
            color: #333;
        }

        .sizes-grid {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .size-btn {
            padding: 0.45rem 1rem;
            border: 2px solid #ccc;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .size-btn:hover {
            border-color: #667eea;
            color: #667eea;
        }

        .size-btn.selected {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }

        .btn-add-cart-detail {
            width: 100%;
            padding: 1rem 1.5rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.3s;
            margin-top: 0.5rem;
        }

        .btn-add-cart-detail:hover {
            opacity: 0.9;
        }

        .btn-view-cart {
            width: 100%;
            padding: 0.85rem;
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
            text-decoration: none;
            display: block;
            text-align: center;
        }

        .btn-view-cart:hover {
            background: #f0f2ff;
        }

        .toast-msg {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: #4caf50;
            color: white;
            padding: 0.9rem 1.5rem;
            border-radius: 10px;
            font-weight: 600;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            display: none;
            z-index: 9999;
            animation: fadeInUp 0.3s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .not-found-state {
            text-align: center;
            padding: 5rem 1rem;
        }

        .not-found-state h2 {
            color: #999;
            margin-bottom: 1rem;
            font-size: 1.6rem;
        }

        .not-found-state p {
            color: #aaa;
            margin-bottom: 1.5rem;
        }

        .posted-date {
            font-size: 0.85rem;
            color: #aaa;
        }

        /* Related products strip */
        .related-section {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid #eee;
        }

        .related-section h3 {
            font-size: 1.4rem;
            margin-bottom: 1.2rem;
            color: #333;
        }

        footer {
            background: #2a2a2a;
            color: #ccc;
            text-align: center;
            padding: 2rem 0;
            margin-top: 3rem;
        }

        footer a {
            color: #667eea;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <header>
        <div class="container">
            <div class="logo">
                <h1>👗 FASHION HUB</h1>
            </div>
            <nav>
                <ul>
                    <li><a href="home.html">Home</a></li>
                    <li><a href="index.html#products">Shop</a></li>
                    <li><a href="index.html#retailer" id="sell-link">Sell</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="contact.html">Contact</a></li>
                    <li>
                        <a href="#" class="cart-btn" id="cart-nav-link">
                            🛒 Cart (<span id="cart-count">0</span>)
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="container product-detail-wrapper">
        <div class="breadcrumb">
            <a href="home.html">Home</a>
            <span>/</span>
            <a href="index.html#products">Shop</a>
            <span>/</span>
            <span id="breadcrumb-product-name">Product</span>
        </div>

        <a class="btn-back" href="index.html#products">&#8592; Back to Products</a>

        <div id="product-detail-container"></div>

        <div id="related-section-container"></div>
    </div>

    <div id="toast" class="toast-msg"></div>

    <!-- Cart Panel (slide-in) -->
    <div id="cart-panel" style="display:none; position:fixed; top:0; right:0; height:100vh; width:340px; background:#fff; box-shadow:-4px 0 20px rgba(0,0,0,0.15); z-index:10000; overflow-y:auto; padding:1.5rem;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
            <h3>Shopping Cart</h3>
            <button onclick="closeCartPanel()" style="background:none; border:none; font-size:1.5rem; cursor:pointer; color:#999;">&times;</button>
        </div>
        <div id="cart-panel-items"></div>
        <div id="cart-panel-footer" style="margin-top:1rem;"></div>
    </div>
    <div id="cart-overlay" onclick="closeCartPanel()" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.3); z-index:9999;"></div>

    <footer>
        <div class="container">
            <p>&copy; 2026 FASHION HUB &mdash;
                <a href="home.html">Home</a> &bull;
                <a href="index.html#products">Shop</a> &bull;
                <a href="about.html">About</a> &bull;
                <a href="contact.html">Contact</a>
            </p>
        </div>
    </footer>

    <script>
        /* -------- Cart helpers (localStorage-based for cross-page persistence) -------- */
        function loadCart() {
            try { return JSON.parse(localStorage.getItem('fashionCart') || '[]'); } catch { return []; }
        }

        function saveCart(cart) {
            localStorage.setItem('fashionCart', JSON.stringify(cart));
        }

        function updateCartCount() {
            document.getElementById('cart-count').textContent = loadCart().length;
        }

        function showToast(msg, color) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.background = color || '#4caf50';
            t.style.display = 'block';
            setTimeout(() => { t.style.display = 'none'; }, 3000);
        }

        /* -------- Load product from URL param -------- */
        const params = new URLSearchParams(window.location.search);
        const productId = parseInt(params.get('id'), 10);

        let product = null;
        let allProducts = [];
        let selectedSize = null;

        function escHtml(str) {
            return String(str ?? '')
                .replace(/&/g, '&amp;').replace(/</g, '&lt;')
                .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function selectSize(btn, size) {
            document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedSize = size;
        }

        function addToCart() {
            if (!product) return;
            const cart = loadCart();
            cart.push({
                ...product,
                selectedSize: selectedSize || 'Not specified',
                cartItemId: Date.now()
            });
            saveCart(cart);
            updateCartCount();
            showToast(`${escHtml(product.name)} added to cart!`);
        }

        /* -------- Cart panel -------- */
        function openCartPanel() {
            const cart = loadCart();
            const itemsEl = document.getElementById('cart-panel-items');
            const footerEl = document.getElementById('cart-panel-footer');

            if (cart.length === 0) {
                itemsEl.innerHTML = '<p style="color:#aaa; text-align:center; padding:2rem 0;">Your cart is empty.</p>';
                footerEl.innerHTML = '';
            } else {
                const total = cart.reduce((sum, item) => sum + item.price, 0);
                itemsEl.innerHTML = cart.map((item, idx) => `
                    <div style="display:flex; justify-content:space-between; align-items:start; padding:0.8rem 0; border-bottom:1px solid #f0f0f0;">
                        <div>
                            <p style="font-weight:600; margin-bottom:0.2rem;">${escHtml(item.name)}</p>
                            <p style="color:#888; font-size:0.85rem;">Size: ${escHtml(item.selectedSize)} &bull; $${item.price.toFixed(2)}</p>
                        </div>
                        <button onclick="removeCartItem(${idx})" style="background:none; border:none; color:#e53935; cursor:pointer; font-size:1.1rem;">&#x2715;</button>
                    </div>
                `).join('');
                footerEl.innerHTML = `
                    <p style="font-weight:700; font-size:1.1rem; margin-top:1rem;">Total: $${total.toFixed(2)}</p>
                    <button onclick="clearCart()" style="width:100%; margin-top:0.8rem; padding:0.8rem; background:#e53935; color:#fff; border:none; border-radius:8px; font-weight:600; cursor:pointer;">Clear Cart</button>
                    <button onclick="checkout()" style="width:100%; margin-top:0.5rem; padding:0.8rem; background:linear-gradient(135deg,#667eea,#764ba2); color:#fff; border:none; border-radius:8px; font-weight:600; cursor:pointer;">Proceed to Checkout</button>
                `;
            }

            document.getElementById('cart-panel').style.display = 'block';
            document.getElementById('cart-overlay').style.display = 'block';
        }

        function closeCartPanel() {
            document.getElementById('cart-panel').style.display = 'none';
            document.getElementById('cart-overlay').style.display = 'none';
        }

        function removeCartItem(index) {
            const cart = loadCart();
            cart.splice(index, 1);
            saveCart(cart);
            updateCartCount();
            openCartPanel();
        }

        function clearCart() {
            saveCart([]);
            updateCartCount();
            openCartPanel();
        }

        function checkout() {
            if (loadCart().length === 0) return;
            showToast('Thank you for your order! (Demo checkout)', '#667eea');
            saveCart([]);
            updateCartCount();
            closeCartPanel();
        }

        /* -------- Related products -------- */
        function renderRelated() {
            if (!product) return;
            const related = allProducts.filter(p => p.id !== product.id && p.category === product.category).slice(0, 3);
            if (related.length === 0) return;

            const container = document.getElementById('related-section-container');
            container.innerHTML = `
                <div class="related-section">
                    <h3>More in ${escHtml(product.category.charAt(0).toUpperCase() + product.category.slice(1))}</h3>
                    <div class="products-grid">
                        ${related.map(p => `
                            <div class="product-card" onclick="window.location.href='product_page.html?id=${p.id}'" style="cursor:pointer;">
                                <div class="product-info">
                                    <div class="product-header">
                                        <h3 class="product-name">${escHtml(p.name)}</h3>
                                        <span class="product-price">$${p.price.toFixed(2)}</span>
                                    </div>
                                    <span class="retailer-name">by ${escHtml(p.retailer)}</span>
                                    <span class="product-category">${escHtml(p.category)}${p.subcategory ? ` • ${escHtml(p.subcategory)}` : ''}</span>
                                    <p class="product-description">${escHtml(p.description)}</p>
                                    <p class="product-sizes"><strong>Sizes:</strong> ${escHtml(p.sizes)}</p>
                                    <a href="product_page.html?id=${p.id}" class="btn-add-cart" style="display:block; text-align:center; text-decoration:none; padding:0.8rem; border-radius:8px;">View Details</a>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        /* -------- Render main product -------- */
        function renderProduct() {
            const container = document.getElementById('product-detail-container');

            if (!product || isNaN(productId)) {
                document.title = 'Product Not Found - FASHION HUB';
                container.innerHTML = `
                    <div class="not-found-state">
                        <div style="font-size:4rem; margin-bottom:1rem;">🔍</div>
                        <h2>Product Not Found</h2>
                        <p>This product may have been removed or the link is invalid.</p>
                        <a class="btn-back" href="index.html#products">&#8592; Browse all products</a>
                    </div>`;
                return;
            }

            document.title = `${escHtml(product.name)} – FASHION HUB`;
            document.getElementById('breadcrumb-product-name').textContent = product.name;

            const sizes = product.sizes.split(',').map(s => s.trim()).filter(Boolean);
            const sizeBtns = sizes.map(s =>
                `<button class="size-btn" onclick="selectSize(this, '${escHtml(s)}')">${escHtml(s)}</button>`
            ).join('');

            const postedDate = product.timestamp
                ? new Date(product.timestamp).toLocaleDateString('en-KE', { year: 'numeric', month: 'long', day: 'numeric' })
                : '';

            const imageHtml = product.image
                ? `<div class="product-image-wrapper">
                       <img src="${escHtml(product.image)}" alt="${escHtml(product.name)}" class="product-detail-image"
                            onerror="this.style.display='none'; document.getElementById('img-placeholder').style.display='flex';">
                       <div id="img-placeholder" class="product-detail-image-placeholder" style="display:none;">👗</div>
                   </div>`
                : `<div class="product-detail-image-placeholder">👗</div>`;

            container.innerHTML = `
                <div class="product-detail-grid">
                    <div>${imageHtml}</div>
                    <div class="product-detail-info">
                        <h1 class="product-detail-name">${escHtml(product.name)}</h1>
                        <p class="product-detail-price">$${product.price.toFixed(2)}</p>
                        <p class="product-detail-retailer">Sold by <strong>${escHtml(product.retailer)}</strong></p>
                        <span class="product-detail-category-tag">${escHtml(product.category)}${product.subcategory ? ` • ${escHtml(product.subcategory)}` : ''}</span>
                        <hr class="divider" />
                        <p class="product-detail-description">${escHtml(product.description)}</p>
                        <hr class="divider" />
                        ${sizes.length > 0 ? `
                        <div>
                            <p class="sizes-label">Select Size</p>
                            <div class="sizes-grid">${sizeBtns}</div>
                        </div>` : `<p style="color:#888;">One size available.</p>`}
                        <button class="btn-add-cart-detail" onclick="addToCart()">🛒 Add to Cart</button>
                        ${postedDate ? `<p class="posted-date">Posted on ${postedDate}</p>` : ''}
                    </div>
                </div>`;
        }

        /* -------- Init: fetch product from API -------- */
        async function init() {
            document.getElementById('cart-nav-link').addEventListener('click', function (e) {
                e.preventDefault();
                openCartPanel();
            });
            updateCartCount();

            if (!isNaN(productId)) {
                try {
                    const res = await fetch(`backend/api/products/detail.php?id=${productId}`, {
                        credentials: 'include',
                    });
                    const data = await res.json();
                    if (data.status === 'ok' && data.data && data.data.product) {
                        product = data.data.product;
                        // Fetch related products from same category
                        try {
                            const rRes = await fetch(
                                `backend/api/products/list.php?category=${encodeURIComponent(product.category)}`,
                                { credentials: 'include' }
                            );
                            const rData = await rRes.json();
                            if (rData.status === 'ok') allProducts = rData.data.products || [];
                        } catch { /* use empty allProducts */ }
                    }
                } catch {
                    // Keep product as null; renderProduct will display not-found state.
                }
            }

            renderProduct();
            renderRelated();
        }

        init();
    </script>

</body>
</html>
